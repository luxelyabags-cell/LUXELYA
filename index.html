<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXÉLYA | The Elite Experience</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@200;300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --accent: #e5c07b;
      /* Champagne Gold */
      --bg-dark: #0a0a0a;
      --glass: rgba(0, 0, 0, 0.6);
      --border-white: rgba(255, 255, 255, 0.12);
      --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }

    /* Premium Entrance */
    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes expandX {
      from {
        width: 0;
        opacity: 0;
      }

      to {
        width: 40px;
        opacity: 1;
      }
    }

    @keyframes shimmerGold {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image:
        radial-gradient(circle at 50% -20%, rgba(26, 26, 26, 0.5) 0%, transparent 50%),
        url('Gemini_Generated_Image_hsgzh9hsgzh9hsgz.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      z-index: 1;
    }

    .wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 20px;
      animation: slideUpFade 1.2s ease-out;
    }

    .main-card {
      background: var(--glass);
      border: 1px solid var(--border-white);
      backdrop-filter: blur(10px);
      border-radius: 60px 20px 60px 20px;
      /* Modern asymmetric radius */
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
    }

    .logo-box {
      margin-bottom: 30px;
      display: inline-block;
      position: relative;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 40px;
      /* Modern squircle */
      object-fit: cover;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 3.2em;
      font-weight: 400;
      letter-spacing: 8px;
      margin: 0;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, #999, #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmerGold 4s linear infinite;
    }

    .separator {
      height: 1px;
      background: var(--accent);
      margin: 25px auto 40px;
      animation: expandX 1.5s ease-out forwards;
    }

    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn-luxury {
      position: relative;
      display: flex;
      align-items: center;
      padding: 18px 25px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-white);
      border-radius: 15px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9em;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
      transition: var(--transition);
      overflow: hidden;
    }

    .btn-luxury i {
      font-size: 1.2em;
      margin-right: 20px;
      color: var(--accent);
      transition: var(--transition);
    }

    .btn-luxury:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      padding-left: 35px;
      letter-spacing: 4px;
    }

    .btn-luxury:hover i {
      transform: scale(1.3);
      color: #fff;
    }

    .btn-luxury::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 2px;
      background: var(--accent);
      transform: scaleY(0);
      transition: var(--transition);
    }

    .btn-luxury:hover::before {
      transform: scaleY(1);
    }

    footer {
      margin-top: 50px;
      font-size: 0.65em;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.3;
      font-weight: 400;
    }

    /* Responsive Brilliance */
    @media (max-width: 480px) {
      .main-card {
        padding: 40px 25px;
        border-radius: 40px 15px;
      }

      .brand-title {
        font-size: 2.2em;
        letter-spacing: 4px;
      }

      .btn-luxury {
        font-size: 0.8em;
        letter-spacing: 1px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="main-card">
      <div class="logo-box">
        <img src="LOGO.png" alt="Luxury Logo" class="logo">
      </div>
      <h1 class="brand-title">LUXÉLYA</h1>
      <div class="separator"></div>

      <div class="links-grid">
        <a href="https://www.facebook.com/profile.php?id=61588444820198" target="_blank" class="btn-luxury">
          <i class="fab fa-facebook-f"></i> Facebook
        </a>
        <a href="https://www.instagram.com/luxelya.n1/" target="_blank" class="btn-luxury">
          <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://www.tiktok.com/@luxelya_bags" target="_blank" class="btn-luxury">
          <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="https://t.me/LUXELYA" target="_blank" class="btn-luxury">
          <i class="fab fa-telegram-plane"></i> Telegram
        </a>
        <a href="https://chat.whatsapp.com/DXt4bEeEqfD5JUhVHkRlqO?mode=gi_t" target="_blank" class="btn-luxury">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
      </div>

      <footer>Defined by Excellence</footer>
    </div>
  </div>

</body>

</html>
